<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RPT">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/roman-personal-training-/manifest.json">
<link rel="apple-touch-icon" href="/roman-personal-training-/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="/roman-personal-training-/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/roman-personal-training-/icons/icon-192.png">
<title>Roman Personal Training</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--surface:#f5f5f5;--card:#eee;
  --accent:#111;--accent2:#444;
  --danger:#d00;--green:#080;
  --text:#111;--muted:#888;--border:#ccc;
  --blue:#1a6fb5;--orange:#e07000;
}
html,body{height:100%;overflow:hidden;touch-action:manipulation;background:var(--bg);}
body{color:var(--text);font-family:'Share Tech Mono',monospace;
  display:flex;flex-direction:column;min-height:100dvh;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid var(--border);background:var(--bg);flex-shrink:0;}
.tab{flex:1;padding:11px 2px;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.5px;
  color:var(--muted);background:none;border:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;
  border-bottom:3px solid transparent;margin-bottom:-2px;
  display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;}
.tab .tab-icon{font-size:16px;line-height:1;}
.tab .tab-lbl{font-size:8px;letter-spacing:0.5px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;}

/* ── TIMER PAGE ── */
.timer-page{padding:10px 14px 12px;gap:8px;align-items:center;}
.top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;}
.brand{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:var(--muted);}
.brand span{color:var(--accent);font-weight:900;}
.set-badge{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;
  background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px 8px;color:var(--muted);}
.set-badge b{color:var(--accent);}
.ex-row{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:7px 11px;display:flex;align-items:center;gap:8px;}
.ex-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);white-space:nowrap;}
.ex-input{flex:1;background:none;border:none;font-family:'Share Tech Mono',monospace;
  font-size:13px;color:var(--accent);outline:none;caret-color:var(--accent);}
.ex-input::placeholder{color:var(--muted);}
.ring-wrap{position:relative;width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ring-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:6;}
.ring-track{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:butt;
  stroke-dasharray:503;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke 0.3s;}
.ring-track.warn{stroke:var(--danger);}
.ring-inner{z-index:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.time-big{font-family:'Orbitron',sans-serif;font-size:50px;font-weight:900;
  line-height:1;letter-spacing:2px;color:var(--accent);transition:color 0.3s;}
.time-big.warn{color:var(--danger);}
.time-big.done{color:var(--danger);}
.status-line{font-size:9px;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.blink{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background 0.3s;}
.blink.go{background:var(--green);animation:bl 0.8s step-end infinite;}
.blink.alert{background:var(--danger);animation:bl 0.4s step-end infinite;}
@keyframes bl{50%{opacity:0;}}
.dots-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;min-height:12px;}
.sdot{width:10px;height:10px;border-radius:2px;background:var(--border);border:1px solid var(--border);transition:all 0.3s;}
.sdot.done{background:var(--accent2);border-color:var(--accent2);}
.sdot.current{background:var(--accent);border-color:var(--accent);}
.dur-row{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;}
.dur-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.dur-ctrl{display:flex;align-items:center;gap:6px;}
.d-btn{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);
  background:var(--bg);color:var(--accent);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s;}
.d-btn:active{background:var(--accent);color:#fff;transform:scale(0.9);}
.presets{display:flex;gap:4px;flex:1;justify-content:center;}
.prs{padding:5px 7px;border-radius:4px;border:1px solid var(--border);
  background:var(--bg);color:var(--muted);font-size:11px;
  font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all 0.12s;
  -webkit-tap-highlight-color:transparent;}
.prs.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.dur-val{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;
  color:var(--accent2);min-width:40px;text-align:center;}
.main-btn{width:100%;height:54px;border-radius:8px;border:none;cursor:pointer;
  font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;
  letter-spacing:4px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.main-btn:active{transform:scale(0.97);}
.btn-start{background:var(--accent);color:#fff;border:2px solid var(--accent);}
.btn-stop{background:var(--surface);border:2px solid var(--border);color:var(--muted);}
.btn-next{background:var(--danger);border:2px solid var(--danger);color:#fff;}
.sets-row{width:100%;display:flex;justify-content:space-between;align-items:center;}
.sets-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);}
.sc{display:flex;align-items:center;gap:10px;}
.s-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);
  background:var(--surface);color:var(--accent);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s;}
.s-btn:active{background:var(--accent);color:#fff;transform:scale(0.9);}
.s-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--text);min-width:24px;text-align:center;}
.voice-bar{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:7px 11px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.voice-lbl{font-size:9px;letter-spacing:1px;color:var(--muted);}
.voice-status{font-size:10px;color:var(--muted);flex:1;text-align:center;}
.voice-status.listening{color:var(--green);}
.voice-status.heard{color:var(--danger);font-weight:700;}
.voice-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all 0.15s;white-space:nowrap;}
.voice-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── REPORTS PAGE ── */
.rep-page{padding:12px 14px;overflow:hidden;gap:0;}
.page-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0;}
.page-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:var(--accent);}
.clr-btn{padding:5px 10px;border-radius:4px;border:1px solid var(--border);background:none;
  color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;}
.clr-btn:active{border-color:var(--danger);color:var(--danger);}
.rep-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;flex:1;}
.rep-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);
  border-radius:6px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.rep-card:active{background:var(--surface);}
.rep-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.rep-date{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;color:var(--accent);}
.rep-total{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--muted);}
.rep-exercises{display:flex;flex-direction:column;gap:4px;}
.rep-ex-row{display:flex;justify-content:space-between;font-size:11px;}
.rep-ex-name{color:var(--text);}
.rep-ex-sets{color:var(--muted);}
.rep-empty{text-align:center;color:var(--muted);font-size:11px;margin-top:60px;}

/* ── CALENDAR PAGE ── */
.cal-page{padding:12px 14px 8px;overflow:hidden;gap:0;}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0;}
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-nav-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);
  background:var(--surface);color:var(--accent);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s;}
.cal-nav-btn:active{background:var(--accent);color:#fff;}
.cal-month-lbl{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;
  color:var(--text);min-width:120px;text-align:center;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;flex-shrink:0;}
.cal-wd{text-align:center;font-size:9px;color:var(--muted);font-family:'Orbitron',sans-serif;padding:3px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;flex-shrink:0;}
.cal-day{aspect-ratio:1;border-radius:5px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  border:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:all 0.15s;position:relative;background:var(--surface);color:var(--muted);}
.cal-day.other-month{opacity:0.2;}
.cal-day.today{border-color:var(--accent);color:var(--accent);}
.cal-day.trained{background:var(--accent);color:#fff;border-color:var(--accent);}
.cal-day.planned{background:var(--card);border:2px dashed var(--accent);color:var(--accent);}
.cal-day.trained.planned{background:var(--accent);border-style:solid;color:#fff;}
.cal-day:active{transform:scale(0.9);}
.cal-dot{width:4px;height:4px;border-radius:50%;background:#fff;position:absolute;bottom:2px;opacity:0.8;}
.cal-legend{display:flex;gap:10px;margin-top:8px;flex-shrink:0;padding-top:7px;border-top:1px solid var(--border);}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);}
.leg-sq{width:10px;height:10px;border-radius:2px;}
.leg-sq.trained{background:var(--accent);}
.leg-sq.planned{border:2px dashed var(--accent);background:var(--card);}
.leg-sq.today{border:2px solid var(--accent);background:var(--surface);}

/* ── CHART PAGE ── */
.chart-page{padding:12px 14px;overflow:hidden;gap:0;}
.chart-controls{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0;}
.chart-seg{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.seg-btn{padding:6px 12px;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;
  background:var(--surface);color:var(--muted);border:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s;}
.seg-btn.on{background:var(--accent);color:#fff;}
.chart-metric{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex:1;justify-content:flex-end;}
.met-btn{padding:6px 10px;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;
  background:var(--surface);color:var(--muted);border:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s;flex:1;text-align:center;}
.met-btn.on{background:var(--accent);color:#fff;}
.chart-wrap{flex:1;position:relative;min-height:0;}
canvas#chartCanvas{width:100%;height:100%;}
.chart-empty{text-align:center;color:var(--muted);font-size:11px;margin-top:60px;}
.chart-stats{display:flex;gap:0;flex-shrink:0;margin-top:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.stat-box{flex:1;padding:8px 4px;text-align:center;border-right:1px solid var(--border);}
.stat-box:last-child{border-right:none;}
.stat-val{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px;}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:300;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.popup-overlay.show{opacity:1;pointer-events:all;}
.popup-box{background:#fff;border-radius:16px 16px 0 0;
  padding:18px 18px 32px;width:100%;max-width:420px;
  transform:translateY(100%);transition:transform 0.25s ease;}
.popup-overlay.show .popup-box{transform:translateY(0);}
.popup-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--accent);margin-bottom:5px;}
.popup-date{font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:1px;}
.popup-info{font-size:11px;color:#555;margin-bottom:10px;font-family:'Share Tech Mono',monospace;line-height:1.5;}
.popup-actions{display:flex;flex-direction:column;gap:7px;}
.popup-action-btn{padding:12px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);font-family:'Share Tech Mono',monospace;
  font-size:13px;color:var(--text);cursor:pointer;text-align:left;
  -webkit-tap-highlight-color:transparent;transition:all 0.12s;width:100%;}
.popup-action-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);}
.popup-action-btn.del:active{background:var(--danger);border-color:var(--danger);}
.popup-close{margin-top:8px;width:100%;padding:10px;border-radius:8px;
  border:1px solid var(--border);background:none;font-family:'Share Tech Mono',monospace;
  font-size:12px;color:var(--muted);cursor:pointer;}

/* FLASH */
.flash{position:fixed;inset:0;background:rgba(200,0,0,0.07);
  opacity:0;pointer-events:none;z-index:200;transition:opacity 0.1s;}
.flash.show{opacity:1;}
</style>
</head>
<body>
<div class="flash" id="flash"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tabTimer"  onclick="showTab('timer')"><span class="tab-icon">⏱</span><span class="tab-lbl">TIMER</span></button>
  <button class="tab"        id="tabRep"    onclick="showTab('rep')"><span class="tab-icon">📋</span><span class="tab-lbl">RAPOARTE</span></button>
  <button class="tab"        id="tabCal"    onclick="showTab('cal')"><span class="tab-icon">📅</span><span class="tab-lbl">CALENDAR</span></button>
  <button class="tab"        id="tabChart"  onclick="showTab('chart')"><span class="tab-icon">📊</span><span class="tab-lbl">GRAFIC</span></button>
</div>

<!-- ══ TIMER ══ -->
<div class="page timer-page active" id="pageTimer">
  <div class="top-bar">
    <div class="brand">ROMAN <span>PERSONAL TRAINING</span></div>
    <div class="set-badge">SET <b id="curSet">1</b> / <b id="totSet">4</b></div>
  </div>
  <div class="ex-row">
    <span class="ex-lbl">EXERCITIU</span>
    <input class="ex-input" id="exInput" type="text" placeholder="ex: Gantere biceps" maxlength="40"/>
  </div>
  <div class="ring-wrap">
    <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
      <circle class="ring-bg" cx="90" cy="90" r="80"/>
      <circle class="ring-track" id="ringTrack" cx="90" cy="90" r="80"/>
    </svg>
    <div class="ring-inner">
      <div class="time-big" id="timeBig">02:00</div>
      <div class="status-line">
        <div class="blink" id="blinkDot"></div>
        <span id="statusTxt">APASA START</span>
      </div>
    </div>
  </div>
  <div class="dots-row" id="dotsRow"></div>
  <div class="dur-row">
    <div class="dur-lbl">DURATA PAUZA</div>
    <div class="dur-ctrl">
      <button class="d-btn" onclick="chDur(-15)">−</button>
      <div class="presets">
        <button class="prs"    id="pr60"  onclick="setPr(60)">1:00</button>
        <button class="prs"    id="pr90"  onclick="setPr(90)">1:30</button>
        <button class="prs on" id="pr120" onclick="setPr(120)">2:00</button>
        <button class="prs"    id="pr180" onclick="setPr(180)">3:00</button>
      </div>
      <button class="d-btn" onclick="chDur(15)">+</button>
      <div class="dur-val" id="durVal">2:00</div>
    </div>
  </div>
  <button class="main-btn btn-start" id="mainBtn" onclick="handleMain()">▶ START</button>
  <div class="sets-row">
    <span class="sets-lbl">SETURI TOTALE</span>
    <div class="sc">
      <button class="s-btn" onclick="chSets(-1)">−</button>
      <div class="s-val" id="setsVal">4</div>
      <button class="s-btn" onclick="chSets(1)">+</button>
    </div>
  </div>
  <div class="voice-bar">
    <span class="voice-lbl">🎤 VOCE</span>
    <span class="voice-status" id="voiceStatus">INACTIV</span>
    <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">PORNESTE</button>
  </div>
</div>

<!-- ══ RAPOARTE ══ -->
<div class="page rep-page" id="pageRep">
  <div class="page-hdr">
    <div class="page-title">RAPOARTE ZILNICE</div>
    <button class="clr-btn" onclick="clearHistory()">✕ STERGE</button>
  </div>
  <div class="rep-list" id="repList"></div>
</div>

<!-- ══ CALENDAR ══ -->
<div class="page cal-page" id="pageCal">
  <div class="cal-hdr">
    <div class="page-title">CALENDAR</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month-lbl" id="calMonthLbl"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-weekdays">
    <div class="cal-wd">LU</div><div class="cal-wd">MA</div><div class="cal-wd">MI</div>
    <div class="cal-wd">JO</div><div class="cal-wd">VI</div>
    <div class="cal-wd">SA</div><div class="cal-wd">DU</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-legend">
    <div class="leg-item"><div class="leg-sq trained"></div>Antrenat</div>
    <div class="leg-item"><div class="leg-sq planned"></div>Planificat</div>
    <div class="leg-item"><div class="leg-sq today"></div>Azi</div>
  </div>
</div>

<!-- ══ GRAFIC ══ -->
<div class="page chart-page" id="pageChart">
  <div class="page-hdr" style="margin-bottom:8px;">
    <div class="page-title">GRAFIC PROGRES</div>
  </div>
  <div class="chart-controls">
    <div class="chart-seg">
      <button class="seg-btn on" id="segW" onclick="setPeriod('week')">SAPT</button>
      <button class="seg-btn"    id="segM" onclick="setPeriod('month')">LUNA</button>
    </div>
    <div class="chart-metric">
      <button class="met-btn on" id="metS" onclick="setMetric('sets')">SERII</button>
      <button class="met-btn"    id="metE" onclick="setMetric('exs')">EXERCITII</button>
    </div>
  </div>
  <div class="chart-wrap" id="chartWrap">
    <canvas id="chartCanvas"></canvas>
  </div>
  <div class="chart-stats" id="chartStats"></div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popupOverlay" onclick="overlayClick(event)">
  <div class="popup-box">
    <div class="popup-title">📅 ZI SELECTATA</div>
    <div class="popup-date"    id="popupDate"></div>
    <div class="popup-info"    id="popupInfo"></div>
    <div class="popup-actions" id="popupActions"></div>
    <button class="popup-close" onclick="closePopup()">✕ Inchide</button>
  </div>
</div>

<script>
// ══ HELPERS ══
const $=id=>document.getElementById(id);
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
const DAYS_RO=['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];
const MONTHS_RO=['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
  'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const SHORT_MONTHS=['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];

// ══ TIMER STATE ══
const CIRC=2*Math.PI*80; // r=80 → ~503
let totalSec=120,remaining=120,totalSets=4,curSet=1;
let running=false,finished=false,interval=null,audioCtx=null;

const timeBig=$('timeBig'),ringTrack=$('ringTrack');
const blinkDot=$('blinkDot'),statusTxt=$('statusTxt'),mainBtn=$('mainBtn');
const curSetEl=$('curSet'),totSetEl=$('totSet'),setsVal=$('setsVal');
const dotsRow=$('dotsRow'),durVal=$('durVal'),exInput=$('exInput');
const flash=$('flash');
const voiceStatus=$('voiceStatus'),voiceBtn=$('voiceBtn');
ringTrack.style.strokeDasharray=CIRC;

// ══ TABS ══
function showTab(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('page'+n[0].toUpperCase()+n.slice(1)).classList.add('active');
  $('tab'+n[0].toUpperCase()+n.slice(1)).classList.add('active');
  if(n==='rep')   renderReports();
  if(n==='cal')   renderCalendar();
  if(n==='chart') renderChart();
}

// ══ TIMER DISPLAY ══
function updateDisplay(){
  timeBig.textContent=fmt(remaining);
  ringTrack.style.strokeDashoffset=CIRC*(1-remaining/totalSec);
  const w=remaining<=10&&running&&!finished;
  timeBig.classList.toggle('warn',w);
  timeBig.classList.toggle('done',finished);
  ringTrack.classList.toggle('warn',w);
}
function renderDots(){
  dotsRow.innerHTML='';
  for(let i=1;i<=totalSets;i++){
    const d=document.createElement('div');
    d.className='sdot'+(i<curSet?' done':i===curSet?' current':'');
    dotsRow.appendChild(d);
  }
}

// ══ AUDIO ══
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playTick(){
  initAudio();const ctx=audioCtx;
  const buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,5)*0.8;
  const src=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
  f.type='bandpass';f.frequency.value=1600;f.Q.value=1.5;
  src.buffer=buf;src.connect(f);f.connect(g);g.connect(ctx.destination);
  g.gain.setValueAtTime(0.6,ctx.currentTime);src.start();
}
function playAlarm(){
  // Clopot curat — sine pur cu decay natural
  initAudio();const ctx=audioCtx,now=ctx.currentTime;

  // Strat 1: fundamental (tonul principal al clopotului)
  const osc1=ctx.createOscillator(),g1=ctx.createGain();
  osc1.type='sine';
  osc1.frequency.setValueAtTime(880,now);
  g1.gain.setValueAtTime(0.001,now);
  g1.gain.exponentialRampToValueAtTime(0.6,now+0.005);
  g1.gain.exponentialRampToValueAtTime(0.001,now+1.2);
  osc1.connect(g1);g1.connect(ctx.destination);
  osc1.start(now);osc1.stop(now+1.3);

  // Strat 2: armonice (sunetul metalic al clopotului)
  const osc2=ctx.createOscillator(),g2=ctx.createGain();
  osc2.type='sine';
  osc2.frequency.setValueAtTime(2637,now);
  g2.gain.setValueAtTime(0.001,now);
  g2.gain.exponentialRampToValueAtTime(0.25,now+0.005);
  g2.gain.exponentialRampToValueAtTime(0.001,now+0.6);
  osc2.connect(g2);g2.connect(ctx.destination);
  osc2.start(now);osc2.stop(now+0.7);

  // Strat 3: sub-armonica (corpul clopotului)
  const osc3=ctx.createOscillator(),g3=ctx.createGain();
  osc3.type='sine';
  osc3.frequency.setValueAtTime(1320,now);
  g3.gain.setValueAtTime(0.001,now);
  g3.gain.exponentialRampToValueAtTime(0.3,now+0.005);
  g3.gain.exponentialRampToValueAtTime(0.001,now+0.9);
  osc3.connect(g3);g3.connect(ctx.destination);
  osc3.start(now);osc3.stop(now+1.0);
}
function doVibrate(){if(navigator.vibrate)navigator.vibrate([300,100,300,100,600]);}
function doFlash(){flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),400);}

// ══ TIMER LOGIC ══
function handleMain(){
  initAudio();
  if(finished){
    if(curSet<totalSets){curSet++;curSetEl.textContent=curSet;renderDots();resetTimer();startTimer();}
    else{curSet=1;curSetEl.textContent=1;renderDots();resetTimer();idleUI();}
    return;
  }
  if(!running)startTimer();else stopTimer();
}
function startTimer(){
  running=true;finished=false;
  blinkDot.className='blink go';statusTxt.textContent='PAUZA ACTIVA';
  mainBtn.className='main-btn btn-stop';mainBtn.textContent='■ STOP';
  timeBig.classList.remove('done','warn');ringTrack.classList.remove('warn');
  interval=setInterval(()=>{
    remaining--;updateDisplay();
    if(remaining>0&&remaining<=10)playTick();
    if(remaining<=0){clearInterval(interval);timerDone();}
  },1000);
}
function stopTimer(){
  clearInterval(interval);running=false;
  blinkDot.className='blink';statusTxt.textContent='OPRIT';
  mainBtn.className='main-btn btn-start';mainBtn.textContent='▶ RESUME';
}
function timerDone(){
  running=false;finished=true;remaining=0;updateDisplay();
  playAlarm();doVibrate();doFlash();
  logSet();
  timeBig.classList.add('done');blinkDot.className='blink alert';
  statusTxt.textContent='GATA! RIDICA!';
  mainBtn.className='main-btn btn-next';
  mainBtn.textContent=curSet<totalSets?`► SET ${curSet+1}`:'✓ RESET';
}
function resetTimer(){
  clearInterval(interval);running=false;finished=false;remaining=totalSec;
  timeBig.classList.remove('warn','done');ringTrack.classList.remove('warn');updateDisplay();
}
function idleUI(){
  blinkDot.className='blink';statusTxt.textContent='APASA START';
  mainBtn.className='main-btn btn-start';mainBtn.textContent='▶ START';
}

// ══ DURATION / SETS ══
function chDur(d){
  if(running||finished)return;
  totalSec=Math.max(15,Math.min(600,totalSec+d));remaining=totalSec;updateDisplay();updateDurUI();
}
function setPr(s){if(running||finished)return;totalSec=s;remaining=s;updateDisplay();updateDurUI();}
function updateDurUI(){
  durVal.textContent=fmt(totalSec);
  ['pr60','pr90','pr120','pr180'].forEach(id=>$(id).classList.remove('on'));
  const m={60:'pr60',90:'pr90',120:'pr120',180:'pr180'};
  if(m[totalSec])$(m[totalSec]).classList.add('on');
}
function chSets(d){
  if(running)return;
  totalSets=Math.max(1,Math.min(12,totalSets+d));
  if(curSet>totalSets){curSet=totalSets;curSetEl.textContent=curSet;}
  totSetEl.textContent=totalSets;setsVal.textContent=totalSets;renderDots();
}

// ══ STORAGE ══
function getHistory(){try{return JSON.parse(localStorage.getItem('rpt_history')||'[]');}catch{return[];}}
function saveHistory(h){try{localStorage.setItem('rpt_history',JSON.stringify(h));}catch{}}
function getPlanned(){try{return JSON.parse(localStorage.getItem('rpt_planned')||'{}');}catch{return{};}}
function savePlanned(p){try{localStorage.setItem('rpt_planned',JSON.stringify(p));}catch{}}

function logSet(){
  const name=exInput.value.trim()||'Exercitiu';
  const h=getHistory();
  const today=new Date().toLocaleDateString('ro-RO');
  const timeNow=new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
  h.unshift({name,date:today,time:timeNow,setNr:curSet,totalSets,dur:totalSec});
  saveHistory(h.slice(0,500));
}

// ══ BUILD DAILY REPORTS from raw history ══
// Returns array of {dateKey, dateLabel, dayName, exercises:{name,sets}[], totalSets, totalExs}
function buildReports(){
  const h=getHistory();
  const map={}; // dateKey → {dateLabel,dayName,exercises}
  h.forEach(e=>{
    // e.date = "13.04.2026"
    const p=e.date.split('.');
    if(p.length!==3)return;
    const dk=`${p[2]}-${p[1]}-${p[0]}`; // YYYY-MM-DD
    if(!map[dk]){
      const d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
      map[dk]={dk,dateLabel:e.date,dayName:DAYS_RO[d.getDay()],exercises:{}};
    }
    if(!map[dk].exercises[e.name])map[dk].exercises[e.name]=0;
    map[dk].exercises[e.name]++;
  });
  // Sort descending
  return Object.values(map).sort((a,b)=>b.dk.localeCompare(a.dk)).map(r=>{
    const exArr=Object.entries(r.exercises).map(([name,sets])=>({name,sets}));
    const totalSets=exArr.reduce((s,e)=>s+e.sets,0);
    return{...r,exArr,totalSets,totalExs:exArr.length};
  });
}

// ══ REPORTS PAGE ══
function renderReports(){
  const reports=buildReports();
  const list=$('repList');
  if(!reports.length){list.innerHTML='<div class="rep-empty">Niciun antrenament inregistrat inca.</div>';return;}
  list.innerHTML=reports.map(r=>`
    <div class="rep-card">
      <div class="rep-card-hdr">
        <div>
          <div class="rep-date">${r.dayName.toUpperCase()}, ${r.dateLabel}</div>
        </div>
        <div class="rep-total">${r.totalSets} serii · ${r.totalExs} ex</div>
      </div>
      <div class="rep-exercises">
        ${r.exArr.map(e=>`
          <div class="rep-ex-row">
            <span class="rep-ex-name">${e.name}</span>
            <span class="rep-ex-sets">${e.sets} ${e.sets===1?'serie':'serii'}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}
function clearHistory(){
  if(confirm('Stergi tot istoricul si toate rapoartele?')){
    localStorage.removeItem('rpt_history');
    renderReports();
  }
}

// ══ CALENDAR ══
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let selDateKey=null;

function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getTrainedDays(){
  const map={};
  buildReports().forEach(r=>{map[r.dk]=r.exArr.map(e=>e.name);});
  return map;
}
function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar(){
  const grid=$('calGrid');
  $('calMonthLbl').textContent=MONTHS_RO[calMonth]+' '+calYear;
  grid.innerHTML='';
  const today=new Date();
  const trained=getTrainedDays();
  const planned=getPlanned();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const offset=(firstDay===0)?6:firstDay-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const dip=new Date(calYear,calMonth,0).getDate();
  for(let i=offset-1;i>=0;i--){const c=document.createElement('div');c.className='cal-day other-month';c.textContent=dip-i;grid.appendChild(c);}
  for(let d=1;d<=dim;d++){
    const key=dateKey(calYear,calMonth,d);
    const isT=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const iTr=!!trained[key];const iPl=!!planned[key];
    const c=document.createElement('div');
    let cls='cal-day';
    if(isT)cls+=' today';if(iTr)cls+=' trained';if(iPl)cls+=' planned';
    c.className=cls;c.textContent=d;
    if(iTr){const dot=document.createElement('div');dot.className='cal-dot';c.appendChild(dot);}
    const K=key,D=d,IT=iTr,IP=iPl,EX=(trained[key]||[]);
    c.addEventListener('click',()=>openDayPopup(K,D,IT,IP,EX));
    grid.appendChild(c);
  }
  const rem2=(offset+dim)%7===0?0:7-(offset+dim)%7;
  for(let d=1;d<=rem2;d++){const c=document.createElement('div');c.className='cal-day other-month';c.textContent=d;grid.appendChild(c);}
}
function openDayPopup(key,day,isTrained,isPlanned,exercises){
  selDateKey=key;
  const p=key.split('-');
  $('popupDate').textContent=`${day} ${MONTHS_RO[parseInt(p[1])-1]} ${p[0]}`;
  $('popupInfo').textContent=isTrained&&exercises.length?'✅ Antrenat: '+exercises.join(', '):'';
  const actions=$('popupActions');actions.innerHTML='';
  const btn=document.createElement('button');
  if(!isPlanned){
    btn.className='popup-action-btn';btn.textContent='📌 Planifica antrenament';
    btn.onclick=()=>{const pl=getPlanned();pl[selDateKey]=true;savePlanned(pl);closePopup();renderCalendar();};
  } else {
    btn.className='popup-action-btn del';btn.textContent='🗑 Sterge planificare';
    btn.onclick=()=>{const pl=getPlanned();delete pl[selDateKey];savePlanned(pl);closePopup();renderCalendar();};
  }
  actions.appendChild(btn);
  $('popupOverlay').classList.add('show');
}
function closePopup(){$('popupOverlay').classList.remove('show');}
function overlayClick(e){if(e.target===$('popupOverlay'))closePopup();}

// ══ CHART ══
let chartPeriod='week', chartMetric='sets';
let chartAnimReq=null;

function setPeriod(p){
  chartPeriod=p;
  $('segW').classList.toggle('on',p==='week');
  $('segM').classList.toggle('on',p==='month');
  renderChart();
}
function setMetric(m){
  chartMetric=m;
  $('metS').classList.toggle('on',m==='sets');
  $('metE').classList.toggle('on',m==='exs');
  renderChart();
}

function getChartData(){
  const reports=buildReports();
  const now=new Date();
  let labels=[],values=[],totalAll=0,maxVal=0,daysCount=0;

  if(chartPeriod==='week'){
    // Last 7 days
    for(let i=6;i>=0;i--){
      const d=new Date(now);d.setDate(now.getDate()-i);
      const dk=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
      const r=reports.find(x=>x.dk===dk);
      const val=r?(chartMetric==='sets'?r.totalSets:r.totalExs):0;
      labels.push(DAYS_RO[d.getDay()].substring(0,2));
      values.push(val);
      if(val>0)daysCount++;
      totalAll+=val;
      if(val>maxVal)maxVal=val;
    }
  } else {
    // Last 30 days grouped by week
    const weeks=[];
    for(let w=3;w>=0;w--){
      const wStart=new Date(now);wStart.setDate(now.getDate()-w*7-6);
      const wEnd=new Date(now);wEnd.setDate(now.getDate()-w*7);
      let wVal=0;
      for(let d=new Date(wStart);d<=wEnd;d.setDate(d.getDate()+1)){
        const dk=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
        const r=reports.find(x=>x.dk===dk);
        if(r)wVal+=chartMetric==='sets'?r.totalSets:r.totalExs;
      }
      const lbl=`${wStart.getDate()}/${wStart.getMonth()+1}`;
      weeks.push({lbl,val:wVal});
      totalAll+=wVal;if(wVal>maxVal)maxVal=wVal;
      if(wVal>0)daysCount++;
    }
    labels=weeks.map(w=>w.lbl);
    values=weeks.map(w=>w.val);
  }

  return{labels,values,totalAll,maxVal,daysCount};
}

function renderChart(){
  const canvas=$('chartCanvas');
  const wrap=$('chartWrap');
  const W=wrap.clientWidth;
  const H=wrap.clientHeight;
  canvas.width=W*devicePixelRatio;
  canvas.height=H*devicePixelRatio;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);

  const {labels,values,totalAll,maxVal,daysCount}=getChartData();

  // Stats
  const avg=daysCount>0?(totalAll/daysCount).toFixed(1):0;
  $('chartStats').innerHTML=`
    <div class="stat-box"><div class="stat-val">${totalAll}</div><div class="stat-lbl">${chartMetric==='sets'?'SERII TOTALE':'EXERCITII'}</div></div>
    <div class="stat-box"><div class="stat-val">${daysCount}</div><div class="stat-lbl">ZILE ACTIVE</div></div>
    <div class="stat-box"><div class="stat-val">${avg}</div><div class="stat-lbl">MEDIE/ZI</div></div>
    <div class="stat-box"><div class="stat-val">${maxVal}</div><div class="stat-lbl">MAXIM</div></div>`;

  if(totalAll===0){
    ctx.fillStyle='#888';ctx.font='12px Share Tech Mono';ctx.textAlign='center';
    ctx.fillText('Niciun antrenament in aceasta perioada.',W/2,H/2);return;
  }

  // Layout
  const PAD={top:20,right:16,bottom:40,left:36};
  const cW=W-PAD.left-PAD.right;
  const cH=H-PAD.top-PAD.bottom;
  const n=labels.length;
  const yMax=maxVal||1;

  // Grid lines
  const gridCount=4;
  ctx.strokeStyle='#e8e8e8';ctx.lineWidth=1;
  for(let i=0;i<=gridCount;i++){
    const y=PAD.top+cH-(i/gridCount)*cH;
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
    // Y labels
    const val=Math.round((i/gridCount)*yMax);
    ctx.fillStyle='#aaa';ctx.font=`${9*devicePixelRatio/devicePixelRatio}px Share Tech Mono`;
    ctx.textAlign='right';ctx.fillText(val,PAD.left-5,y+3);
  }

  // X labels
  ctx.fillStyle='#888';ctx.textAlign='center';
  const step=cW/(n-1||1);
  labels.forEach((lbl,i)=>{
    const x=PAD.left+(n===1?cW/2:i*step);
    ctx.fillText(lbl,x,H-PAD.bottom+14);
  });

  // Area fill
  ctx.beginPath();
  values.forEach((v,i)=>{
    const x=PAD.left+(n===1?cW/2:i*step);
    const y=PAD.top+cH-(v/yMax)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  // Close area
  const lastX=PAD.left+(n===1?cW/2:(n-1)*step);
  const firstX=PAD.left+(n===1?cW/2:0);
  ctx.lineTo(lastX,PAD.top+cH);ctx.lineTo(firstX,PAD.top+cH);ctx.closePath();
  const grad=ctx.createLinearGradient(0,PAD.top,0,PAD.top+cH);
  grad.addColorStop(0,'rgba(17,17,17,0.15)');grad.addColorStop(1,'rgba(17,17,17,0.01)');
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();
  values.forEach((v,i)=>{
    const x=PAD.left+(n===1?cW/2:i*step);
    const y=PAD.top+cH-(v/yMax)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#111';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();

  // Dots
  values.forEach((v,i)=>{
    const x=PAD.left+(n===1?cW/2:i*step);
    const y=PAD.top+cH-(v/yMax)*cH;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle=v>0?'#111':'#ccc';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    // Value labels on dots
    if(v>0){
      ctx.fillStyle='#111';ctx.font='bold 10px Share Tech Mono';ctx.textAlign='center';
      ctx.fillText(v,x,y-10);
    }
  });
}

// ══ VOICE ══
let voiceActive=false,voiceCooldown=false,recognition=null,voiceRestartTimer=null;
function toggleVoice(){voiceActive?stopVoice():startVoice();}
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setVS('','❌ Numai Chrome');return;}
  voiceActive=true;voiceBtn.textContent='OPRESTE';voiceBtn.classList.add('on');
  setVS('listening','🎤 Pornire...');runRec();
}
function runRec(){
  if(!voiceActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(recognition){try{recognition.abort();}catch{}}
  recognition=new SR();
  recognition.lang='ro-RO';recognition.continuous=false;
  recognition.interimResults=true;recognition.maxAlternatives=10;
  recognition.onstart=()=>setVS('listening','🎤 ASCULT — zi "DA"');
  recognition.onresult=(e)=>{
    let txt='';
    for(let i=e.resultIndex;i<e.results.length;i++)
      for(let j=0;j<e.results[i].length;j++)txt+=e.results[i][j].transcript;
    const t=txt.toLowerCase().trim();
    setVS('listening','🎤 "'+txt.substring(0,8)+'"');
    if(!voiceCooldown&&(/\bda\b/i.test(t)||t==='da'||t==='dă')){
      voiceCooldown=true;setVS('heard','✅ DA — GO!');handleMain();
      setTimeout(()=>{voiceCooldown=false;},2500);
    }
  };
  recognition.onerror=(e)=>{
    setVS('listening','⚠️ '+e.error);
    if(e.error==='not-allowed'){stopVoice();return;}
    if(voiceActive)voiceRestartTimer=setTimeout(runRec,400);
  };
  recognition.onend=()=>{if(voiceActive)voiceRestartTimer=setTimeout(runRec,200);};
  try{recognition.start();}catch{if(voiceActive)voiceRestartTimer=setTimeout(runRec,500);}
}
function setVS(cls,txt){voiceStatus.textContent=txt;voiceStatus.className='voice-status'+(cls?' '+cls:'');}
function stopVoice(){
  voiceActive=false;voiceCooldown=false;clearTimeout(voiceRestartTimer);
  if(recognition){try{recognition.abort();}catch{}recognition=null;}
  setVS('','INACTIV');voiceBtn.textContent='PORNESTE';voiceBtn.classList.remove('on');
}

// Resize chart on orientation change
window.addEventListener('resize',()=>{if($('pageChart').classList.contains('active'))renderChart();});

// ══ INIT ══
updateDisplay();updateDurUI();renderDots();
